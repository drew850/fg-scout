// ── API HELPERS ──────────────────────────────────────────────────────────
// All external calls go through the local Python proxy (start.py)
// so there are no CORS issues regardless of how the file is served.
const PROXY = window.location.origin + "/proxy";

async function proxyFetch(targetUrl, method, headers, body) {
  // Credentials (Notion/Anthropic keys) are injected by the server based on host.
  // We only send the session token so the proxy can authenticate the request.
  const res = await fetch(PROXY + "?url=" + encodeURIComponent(targetUrl), {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-Session-Token": sessionStorage.getItem("qa_session") || ""
    },
    body: JSON.stringify({
      _method: method || "GET",
      _body: body
    })
  });
  if (!res.ok) {
    const txt = await res.text().catch(() => "");
    throw new Error("Request failed " + res.status + ": " + txt.slice(0, 200));
  }
  return res.json();
}

async function notionAPI(path, method, body) {
  // No auth header from client — server attaches the Notion token.
  return proxyFetch("https://api.notion.com" + path, method || "GET", null, body);
}

async function callClaude(prompt) {
  const data = await proxyFetch(
    "https://api.anthropic.com/v1/messages",
    "POST",
    null,
    { model: "claude-haiku-4-5-20251001", max_tokens: 4000, messages: [{ role: "user", content: prompt }] }
  );
  return (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n");
}

// Use Sonnet for insights -- much better analysis quality, worth the extra cost
async function callClaudeInsights(prompt) {
  const data = await proxyFetch(
    "https://api.anthropic.com/v1/messages",
    "POST",
    null,
    { model: "claude-sonnet-4-5", max_tokens: 8000, messages: [{ role: "user", content: prompt }] }
  );
  return (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n");
}

// Retry on 429 rate limit with exponential backoff, and on 502/503/504 upstream errors with flat 3s delay
async function callClaudeWithRetry(prompt, maxRetries=4) {
  var upstreamRetries = 0;
  var maxUpstreamRetries = 2;
  for (var attempt=0; attempt<=maxRetries; attempt++) {
    try {
      return await callClaude(prompt);
    } catch(e) {
      var is429 = e.message && e.message.includes("429");
      var isUpstream = e.message && (e.message.includes("502") || e.message.includes("503") || e.message.includes("504"));
      if (is429 && attempt < maxRetries) {
        var wait = Math.pow(2, attempt) * 3000; // 3s, 6s, 12s, 24s
        console.log("[QA] Rate limited, waiting " + (wait/1000) + "s...");
        await new Promise(function(r){setTimeout(r, wait);});
      } else if (isUpstream && upstreamRetries < maxUpstreamRetries) {
        upstreamRetries++;
        console.log("[QA] Upstream error, retry " + upstreamRetries + "/" + maxUpstreamRetries + " in 3s...");
        await new Promise(function(r){setTimeout(r, 3000);});
      } else {
        throw e;
      }
    }
  }
}

async function loadConfigFromNotion(dbId, key) {
  try {
    // Load base key
    const data = await notionAPI(`/v1/databases/${dbId}/query`,"POST",{
      filter:{property:"Key",rich_text:{equals:key}},page_size:1
    });
    const page = data.results?.[0];
    if(!page) return null;
    let val = getProp(page,"Value")||"";
    if(!val) return null;
    // Check for additional chunks (key__1, key__2, ...)
    for(let ci=1; ci<10; ci++) {
      const chunkKey = key+"__"+ci;
      const chunkData = await notionAPI(`/v1/databases/${dbId}/query`,"POST",{
        filter:{property:"Key",rich_text:{equals:chunkKey}},page_size:1
      });
      const chunkPage = chunkData.results?.[0];
      if(!chunkPage) break;
      val += getProp(chunkPage,"Value")||"";
    }
    return JSON.parse(val);
  } catch(e) { console.error("[QA] loadConfig:",e); return null; }
}

async function saveConfigToNotion(dbId, key, value) {
  const fullJson = JSON.stringify(value);
  const CHUNK = 1900;
  // Split into chunks -- each stored as key, key__1, key__2, etc.
  const chunks = [];
  for(let i=0; i<fullJson.length; i+=CHUNK) chunks.push(fullJson.slice(i,i+CHUNK));
  // If only one chunk, store as plain key (backwards compatible)
  const keys = chunks.length===1 ? [key] : chunks.map(function(_,i){return i===0?key:key+"__"+i;});
  for(let ci=0; ci<chunks.length; ci++) {
    const k = keys[ci];
    const find = await notionAPI(`/v1/databases/${dbId}/query`,"POST",{
      filter:{property:"Key",rich_text:{equals:k}},page_size:1
    });
    const existing = find.results?.[0];
    const props = {
      "Key":   {title:[{text:{content:k}}]},
      "Value": {rich_text:[{text:{content:chunks[ci]}}]}
    };
    if(existing) {
      await notionAPI(`/v1/pages/${existing.id}`,"PATCH",{properties:props});
    } else {
      await notionAPI("/v1/pages","POST",{parent:{database_id:dbId},properties:props});
    }
  }
  // Clean up any stale extra chunks from a previous longer save
  for(let si=chunks.length; si<10; si++) {
    const staleKey = key+"__"+si;
    const find = await notionAPI(`/v1/databases/${dbId}/query`,"POST",{
      filter:{property:"Key",rich_text:{equals:staleKey}},page_size:1
    });
    const stale = find.results?.[0];
    if(!stale) break;
    await notionAPI(`/v1/pages/${stale.id}`,"PATCH",{archived:true});
  }
}

function getProp(page, name) {
  const p = page.properties?.[name];
  if (!p) return null;
  switch (p.type) {
    case "title":     return p.title?.map(t => t.plain_text).join("") || "";
    case "rich_text": return p.rich_text?.map(t => t.plain_text).join("") || "";
    case "number":    return p.number ?? null;
    case "checkbox":  return p.checkbox ?? false;
    case "url":       return p.url || "";
    default:          return null;
  }
}

function tryParseJSON(txt) {
  if (!txt) return null;
  try { return JSON.parse(txt); } catch(e) {}
  const cb = txt.match(/```(?:json)?\s*([\s\S]+?)```/);
  if (cb) { try { return JSON.parse(cb[1].trim()); } catch(e) {} }
  const arr = txt.match(/\[[\s\S]{10,}\]/);
  if (arr) { try { return JSON.parse(arr[0]); } catch(e) {} }
  const obj = txt.match(/\{[\s\S]{10,}\}/);
  if (obj) { try { return JSON.parse(obj[0]); } catch(e) {} }
  return null;
}

function parseNotionRow(r) {
  function safeParse(str, fallback) {
    if(!str) return fallback;
    try { return JSON.parse(str); } catch(e) {}
    try { return JSON.parse(str.replace(/'/g,'"')); } catch(e) {}
    return fallback;
  }
  let aiScores = {}, disputes = {}, justifications = {}, autofails = [];

    aiScores, scores: aiScores, disputes, justifications,
    comments:  r.comments  || r["Comments"]  || "",
    transcript: r.transcript || r["Transcript"] || "",
    autofails,
    savedAt: r.savedAt || r["Saved At"] || "",
    notesHistoryJSON: r.notesHistoryJSON || r["Notes History JSON"] || "{}",
    reopenHistoryJSON: r.reopenHistoryJSON || r["Reopen History JSON"] || "[]",
    auditType: r.auditType || r["Audit Type"] || "AI Batch",
    messageCount: parseInt(r.messageCount ?? r["Message Count"] ?? "") || null,

function parseScoreVal(val) {
  if (!val || val === "NA") return null;
  const m = val.match(/\(([\d.]+)\)/);
  return m ? parseFloat(m[1]) : null;
}
function calcScore(scores, matrix) {
  let pts = 0, max = 0;
  matrix.forEach(c => {
    const v = scores[c.id];
    if (!v || v === "NA") return;
    const sv = parseScoreVal(v);
    if (sv !== null) { pts += sv; max += c.max; }
  });
  return max === 0 ? null : { pts, max, pct: Math.round((pts / max) * 100) };
}
function calcDisputedScore(ticket, matrix) {
  // Only approved disputes affect the score -- pending and rejected use AI score
  // normalizeDisputeScore: converts bare labels ("Pass","YES","NO","Partial") to "LEVEL (points)" format
  // Handles legacy disputes saved before the points-in-parens format was enforced
  function normalizeDisputeScore(val, cat) {
    if (!val) return val;
    if (/\([\d.]+\)/.test(val)) return val; // already has points
    var upper = val.toUpperCase();
    if (cat && cat.levels) {
      var match = cat.levels.find(function(l) {
        return l.level.toUpperCase() === upper ||
               (upper === "PASS" && l.level.toUpperCase().startsWith("YES")) ||
               (upper === "MISS" && l.level.toUpperCase().startsWith("NO"));
      });
      if (match && match.points !== null && match.points !== undefined) {
        return match.level + " (" + match.points + ")";
      }
    }
    return val;
  }
  const merged = {};
  matrix.forEach(c => {
    const d = ticket.disputes && ticket.disputes[c.id];
    const useDispute = d && (d.status === "approved" || !d.status); // no status = legacy dispute, treat as approved
    var score = useDispute ? normalizeDisputeScore(d.finalScore, c) : ((ticket.aiScores && ticket.aiScores[c.id]) || "");
    merged[c.id] = score;
  });
  return calcScore(merged, matrix);
}
function scoreLabel(val) {
  if (!val || val === "NA") return null;
  const v = val.toUpperCase();
  if (v.startsWith("YES")) return "Pass";
  if (v.startsWith("PARTIAL")) return "Partial";
  if (v.startsWith("NO")) return "Miss";
  return null;
}
function getWeek() {
  const now = new Date(), start = new Date(now);
  start.setDate(now.getDate() - now.getDay() + 1);
  const end = new Date(start); end.setDate(start.getDate() + 6);
  const fmt = d => d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
  return fmt(start) + " - " + fmt(end) + " " + now.getFullYear();
}
function ticketWeekLabel(createdDate) {
  if (!createdDate) return "";
  const d = new Date(createdDate);
  if (isNaN(d.getTime())) return "";
  const start = new Date(d);
  const day = start.getDay() || 7;
  start.setDate(start.getDate() - day + 1);
  const end = new Date(start); end.setDate(start.getDate() + 6);
  const fmt = dt => dt.toLocaleDateString("en-US", { month: "short", day: "numeric" });
  return fmt(start) + " - " + fmt(end) + " " + d.getFullYear();
}

// ── CSV PARSER ───────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = lines[0].split(",").map(h => h.replace(/^"|"$/g, "").trim());
  return lines.slice(1).map(line => {
    const vals = []; let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; }
      else if (line[i] === ',' && !inQ) { vals.push(cur.trim()); cur = ""; }
      else cur += line[i];
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (vals[i] || "").replace(/^"|"$/g, ""); });
    return obj;
  });
}

const T = {
  green: { text: "#166534", bg: "#f0fdf4", border: "#bbf7d0" },
  amber: { text: "#92400e", bg: "#fffbeb", border: "#fde68a" },
  red: { text: "#991b1b", bg: "#fee2e2", border: "#fecaca" }
};
function formatNotes(justifications, catId) {
  var j = justifications && justifications[catId];
  if (!j) return "";
  var out = j.reason || j.r || "";
  var imp = j.improve || j.i || "";
  if (imp && imp !== "null") out += " | ↑ " + imp;
  return out.slice(0, 1990);
}

function scoreTone(pct) { return pct >= 85 ? T.green : pct >= 70 ? T.amber : T.red; }
function scoreColor(pct) {
  if (pct >= 85) return T.green.text;
  if (pct >= 70) return T.amber.text;
  return T.red.text;
}
function resultBadge(t) {
  if (t.autofail) return { label: "Autofail", ...T.red };
  if (t.passed) return { label: "Pass", ...T.green };

}

  async function loginWithSession(token){
    setSsoLoading(true);
    var session=await verifySession(token);
    if(session){
      var em=session.email.toLowerCase().trim();

      // Session is server-valid — store the token now so the proxy calls made
      // during login (e.g. loadUsersFromNotion) authenticate. Removed below if
      // the user turns out not to be authorized.
      sessionStorage.setItem("qa_session",token);
      setSessionToken(token);

      // Load users from Notion first so we have the latest list
      var users = await loadUsersFromNotion();

      // Strict DB lookup — no domain fallback
      var user = users.find(function(u){return u.email.toLowerCase()===em;});

      // Not in DB at all
      if(!user){
        sessionStorage.removeItem("qa_session");
        setSessionToken("");
        setLoginBlocked({reason:"not_found", email:em});
        setSsoLoading(false);
        return;
      }

      // In DB but inactive
      if(user.active===false){
        sessionStorage.removeItem("qa_session");
        setSessionToken("");
        setLoginBlocked({reason:"inactive", email:em, name:user.name});
        setSsoLoading(false);
        return;
      }

      // Valid user — assign role and load
      var role      = user.role||"agent";
      var name      = user.name||(session.name||em.split("@")[0]);
      var agentName = user.agentName||user.name||"";

      sessionStorage.setItem("qa_session",token);

      setNotionSetup(HARDCODED_SETUP);
      setLoading(true);
      loadAllData(setup2);
    } else {
      sessionStorage.removeItem("qa_session");
      setSessionToken("");
      setLoginError("Session expired. Please sign in again.");
    }
    setSsoLoading(false);
  }

  function getWeekBounds(dateStr) {
    // Returns Mon 00:00 → Sun 23:59 of the week containing dateStr
    var d = new Date(dateStr);
    var day = d.getUTCDay(); // 0=Sun, 1=Mon...
    var diffToMon = (day===0) ? -6 : 1 - day;
    var mon = new Date(d);
    mon.setUTCDate(d.getUTCDate() + diffToMon);
    mon.setUTCHours(0,0,0,0);
    var sun = new Date(mon);
    sun.setUTCDate(mon.getUTCDate() + 6);
    sun.setUTCHours(23,59,59,999);
    return { start: mon.toISOString().slice(0,19), end: sun.toISOString().slice(0,19) };
  }

  async function findReplacementTicket(ticket, minMsg) {
    console.log("[Replace][1] Finding replacement for ticket #"+ticket.ticketId);
    console.log("[Replace][1] Agent:", ticket.agentName, "| Created:", ticket.createdDate||ticket.savedAt);

    var agentName = ticket.agentName||"";
    if(!agentName) { console.log("[Replace][1] No agent name — cannot find replacement"); return null; }

    var createdDate = ticket.createdDate||ticket.savedAt||new Date().toISOString();
    var week = getWeekBounds(createdDate);
    console.log("[Replace][1] Week bounds:", week.start, "→", week.end);

    var usedIds = new Set(
      tickets.map(function(t){return String(t.ticketId);})
             .concat(Array.from(deletedTicketIds))
    );
    console.log("[Replace][1] Excluding", usedIds.size, "already-audited/deleted IDs");

    var candidates = [];
    var cursor = null;
    var reachedCutoff = false;
    var pagesFetched = 0;
    var inWindow = false; // true once we've reached the target week

    while(!reachedCutoff) {
      // Fetch page with 429 retry
      var page = null;
      for(var attempt=0; attempt<5; attempt++) {
        try {
          var params = { limit: 30 };
          if(cursor) params.cursor = cursor;
          var resp = await gorgiasAPI("/tickets", params);
          if(resp._status === 429) {
            var wait = [10000,20000,40000,60000,120000][attempt];
            console.log("[Replace][2] 429 rate limit — waiting "+(wait/1000)+"s (attempt "+(attempt+1)+"/5)");
            setDeleteModal(function(d){return Object.assign({},d,{_status:"Rate limited by Gorgias — pausing "+(wait/1000)+"s..."});});
            await new Promise(function(r){setTimeout(r,wait);});
            continue;
          }
          page = resp;
          break;
        } catch(e) {
          if(attempt===4) throw e;
          await new Promise(function(r){setTimeout(r,3000*(attempt+1));});
        }
      }
      if(!page) break;

      var data = page.data||[];
      if(!data.length) break;
      pagesFetched++;

      // Quick scan: check if ALL tickets on this page are newer than week.end
      var allTooNew = data.every(function(t){
        var c = (t.created_datetime||"").slice(0,19);
        return c > week.end;
      });

      if(allTooNew) {
        // Skip entire page instantly — still burning through recent tickets
        var newest = (data[0].created_datetime||"").slice(0,10);
        console.log("[Replace][2] Page "+pagesFetched+" — all too new (newest: "+newest+"), skipping instantly");
        var nextCursor = (page.meta||{}).next_cursor||page.next_cursor;
        if(!nextCursor) break;
        cursor = nextCursor;
        // No delay — burn fast
        continue;
      }

      // We've reached the target window or gone past it
      inWindow = true;
      console.log("[Replace][2] Page "+pagesFetched+" — entered target window");

      for(var i=0; i<data.length; i++) {
        var t = data[i];
        var created = (t.created_datetime||"").slice(0,19);

        if(created > week.end) continue; // skip tickets newer than window on this mixed page
        if(created && created < week.start) { reachedCutoff = true; break; } // past the window

        // Must be same agent
        var au = t.assignee_user;
        var tAgent = au ? (au.name||((au.firstname||"")+" "+(au.lastname||"")).trim()) : "";
        if(tAgent.toLowerCase() !== agentName.toLowerCase()) {
          console.log("[Replace][2] Skip #"+t.id+" — wrong agent ('"+tAgent+"')");
          continue;
        }

        if(usedIds.has(String(t.id))) {
          console.log("[Replace][2] Skip #"+t.id+" — already audited or deleted");
          continue;
        }

        // Fetch message count
        console.log("[Replace][2] Checking msgs for #"+t.id+"...");
        try {
          var msgResp = await gorgiasAPI("/tickets/"+t.id+"/messages", {limit:100});
          var msgs = msgResp.data||[];
          var msgCount = msgs.length;
          console.log("[Replace][2] #"+t.id+" — "+msgCount+" msgs (min: "+minMsg+")");
          if(msgCount < minMsg) { console.log("[Replace][2] Skip — below min"); continue; }

          var transcript = buildTranscript(msgs);
          var crParts = parseTicketField(t, 9969);

          candidates.push({
            id: String(t.id),
            subject: t.subject||"(no subject)",
            agent: tAgent,
            created: created,
            msgCount: msgCount,
            crL1: crParts[0]||"",
            crL2: crParts[1]||"",
            transcript: transcript,
            ticketUrl: "https://"+((window.__ENV__&&window.__ENV__.GORGIAS_DOMAIN)||"freedomgrooming.gorgias.com")+"/app/ticket/"+t.id,
          });
          console.log("[Replace][2] ✓ Candidate found: #"+t.id+" ("+msgCount+" msgs) — stopping search");
          reachedCutoff = true; // stop fetching further pages
          break;             // stop processing this page
        } catch(e) {
          console.log("[Replace][2] Skip #"+t.id+" — msg fetch error:", e.message);
        }
        await new Promise(function(r){setTimeout(r,500);});
      }

      var nextCursor2 = (page.meta||{}).next_cursor||page.next_cursor;
      if(!nextCursor2||reachedCutoff) break;
      cursor = nextCursor2;
      // Inside window — use normal pacing to avoid rate limits
      if(inWindow) await new Promise(function(r){setTimeout(r,100);});
    }

    console.log("[Replace][2] Search complete. Pages fetched:", pagesFetched, "Candidates:", candidates.length);
    if(!candidates.length) return null;

    var picked = candidates[Math.floor(Math.random()*candidates.length)];
    console.log("[Replace][2] Selected:", picked.id);
    return picked;
  }

  async function scoreAndSaveReplacement(replacement, originalTicket) {
    console.log("[Replace][3] Scoring replacement ticket #"+replacement.id+"...");

    // Build ticket object matching batch QA format
    var auditor = originalTicket.auditor||originalTicket.reviewer||originalTicket.auditedBy||currentUser.name;
    var week = ticketWeekLabel(replacement.created)||ticketWeekLabel(new Date().toISOString().slice(0,10));

    var ticketObj = {
      ticketId:      replacement.id,
      ticketUrl:     replacement.ticketUrl,
      agentName:     replacement.agent,
      transcript:    replacement.transcript,
      subject:       replacement.subject,
      contactReason: replacement.crL1+(replacement.crL2?"::"+replacement.crL2:""),
      createdDate:   replacement.created.slice(0,10),
      customerEmail: "",
      reviewer:      auditor,
    };

    // Score via Claude Haiku (same as batch QA)
    var rawTxt = await callClaudeWithRetry(buildEvalPrompt(ticketObj));
    console.log("[Replace][3] Claude response received");
    var cleanTxt = rawTxt.replace(/```(?:json)?\s*/g,"").replace(/```/g,"").trim();
    var jsonMatch = cleanTxt.match(/\{[\s\S]+\}/);
    if(!jsonMatch) throw new Error("No JSON in Claude response");
    var parsed = JSON.parse(jsonMatch[0]);

          messages: rm.ticket.messageCount,

  function buildEvalPrompt(ticket) {
    var scoreOptions=matrix.map(function(c){return c.levels.map(function(l){return l.points!==null?l.level+" ("+l.points+")":l.level;}).join("|");});
    var rubric=matrix.map(function(c,i){return c.label+" ["+scoreOptions[i]+"]: "+c.levels.map(function(l){return l.level+"="+l.definition;}).join(" | ");}).join("\n");
    var afLines=autofailList.map(function(a,i){return (i+1)+". "+a;}).join("\n");
    var scoresSchema=matrix.map(function(c,i){return '"'+c.id+'":"'+scoreOptions[i]+'"';}).join(",");
    var justSchema=matrix.map(function(c){return '"'+c.id+'":{"reason":"1-2 sentences","improve":"1 sentence or null"}';}).join(",");
    var cleanTranscript = (ticket.transcript||"")
      .slice(0,8000)
      .replace(/â€™/g,"'").replace(/â€˜/g,"'")
      .replace(/â€œ/g,'"').replace(/â€/g,'"')
      .replace(/â€"/g,"—").replace(/â€"/g,"–").replace(/â€¦/g,"...");
    return "You are a QA evaluator for Freedom Grooming customer support. Respond in English only.\n\n"
      +"ENCODING NOTE: The transcript may contain mojibake encoding artifacts (e.g. â€™ â€œ). "
      +"Interpret these as their intended characters (smart quotes, apostrophes) and evaluate normally.\n\n"
      +"IMPORTANT CONTEXT:\n"
      +"- Freedom Grooming uses Jamie as their AI customer service agent — Jamie IS the agent being evaluated\n"
      +"- Gorgias Bot sends only the auto-acknowledgment reply — do NOT evaluate Gorgias Bot\n"
      +"- Yuma is an escalation system — do NOT evaluate Yuma messages\n"
      +"- The AGENT to evaluate is: "+ticket.agentName+"\n"
      +"- If "+ticket.agentName+" has replied in the transcript, evaluate their response\n"
      +"- Score NA only when a category genuinely does not apply (e.g. no order cancellation = NA for that category)\n"
      +"- If the agent named above has NOT replied yet, score all categories NA except CTF\n"
      +"- Score based on what IS in the transcript\n"
+(scoringContext&&scoringContext.trim()?"- WORKFLOW & CONTEXT NOTES:\n"+scoringContext.trim()+"\n":"")
      +"CATEGORIES:\n"+rubric+"\n\n"
      +"AUTOFAILS:\n"+afLines+"\n\n"
      +"TICKET ID: "+ticket.ticketId+"\n"
      +"AGENT: "+ticket.agentName+"\n"
      +"SUBJECT: "+ticket.contactReason+"\n\n"
      +"TICKET FIELD VALUES (already tagged by agent — use these to evaluate CTF Accuracy):\n"
      +"  Contact Reason: "+(ticket.contactReason||"not tagged")+"\n"
      +"  Product: "+((ticket.productL1&&ticket.productL2&&ticket.productL2!=="N/A")?ticket.productL1+"::"+ticket.productL2:ticket.productL1||"not tagged")+"\n"
      +"  Ticket Resolution: "+((ticket.resolutionL1&&ticket.resolutionL2&&ticket.resolutionL2!=="N/A")?ticket.resolutionL1+"::"+ticket.resolutionL2:ticket.resolutionL1||"not tagged")+"\n"
      +"  Additional Resolution: "+((ticket.addResolutionL1&&ticket.addResolutionL2&&ticket.addResolutionL2!=="N/A")?ticket.addResolutionL1+"::"+ticket.addResolutionL2:ticket.addResolutionL1||"not tagged")+"\n\n"
      +"TRANSCRIPT:\n"+cleanTranscript+"\n\n"
      +'Respond ONLY with JSON: {"meta":{"contactReason":"...","product":"...","ticketResolution":"...","returnOrRefund":"..."},'
      +'"scores":{'+scoresSchema+'},'
      +'"justifications":{'+justSchema+'},'
      +'"autofails":[],'
      +'"comments":"+ [key strength observation]\\n- [key improvement observation]"}';
  }

  async function runBatchQA() {
    if(!batchTickets.length)return;
    setBatchRunning(true);batchStopRef.current=false;batchPausedRef.current=false;setBatchPaused(false);

    // Build set of already-evaluated ticket IDs (active Notion tickets + deleted/archived + current batch results)
    var alreadyDone=new Set(
      tickets.map(function(t){return String(t.ticketId);})
        .concat(Array.from(deletedTicketIds))
        .concat(batchResults.filter(function(r){return !r.error;}).map(function(r){return String(r.ticketId);}))
    );

    var results=[...batchResults];
    var startIdx=results.length;
    var skipped=0;
    for(var i=startIdx;i<batchTickets.length;i++){
      if(batchStopRef.current){setBatchStatus("Stopped at ticket "+(i+1)+".");break;}
      while(batchPausedRef.current){await new Promise(function(r){setTimeout(r,500);});}
      var ticket=batchTickets[i];

      // Skip if already evaluated
      if(alreadyDone.has(String(ticket.ticketId))){
        skipped++;
        setBatchStatus("Skipping #"+ticket.ticketId+" — already evaluated ("+skipped+" skipped so far)");
        setBatchResults([...results]);
        continue;
      }
      alreadyDone.add(String(ticket.ticketId)); // prevent dupes within same batch

      var transcriptLen = (ticket.transcript||"").trim().length;
      setBatchStatus("Evaluating "+(i+1)+" of "+batchTickets.length+" — #"+ticket.ticketId+" ("+transcriptLen+" chars)"+(skipped?" · "+skipped+" skipped":""));
      if (!ticket.transcript || ticket.transcript.trim().length < 20) {
        results=[...results,{ticketId:ticket.ticketId,agentName:ticket.agentName,error:"No transcript found in CSV",finalScore:0,passed:false,autofail:false,week}];
        setBatchResults([...results]);
        continue;
      }
      var newResult=null;
      try {
        var rawTxt=await callClaudeWithRetry(buildEvalPrompt(ticket));
        var cleanTxt=rawTxt.replace(/```(?:json)?\s*/g,"").replace(/```/g,"").trim();
        var jsonMatch=cleanTxt.match(/\{[\s\S]+\}/);
        if(!jsonMatch)throw new Error("No JSON in response");
        var parsed=JSON.parse(jsonMatch[0]);
        var sc=calcScore(parsed.scores||{},matrix);
        var hasAF=(parsed.autofails||[]).length>0;
        newResult={
          id:Date.now()+i,week:ticketWeekLabel(ticket.createdDate)||week,auditWeek:week,
          reviewer:ticket.reviewer||activeAuditor||"Batch QA",
          agentName:ticket.agentName,ticketId:String(ticket.ticketId),ticketUrl:ticket.ticketUrl,
          createdDate:ticket.createdDate||"",
          contactReason:parsed.meta?.contactReason||ticket.contactReason,
          product:parsed.meta?.product||"",ticketResolution:parsed.meta?.ticketResolution||"",
          scores:parsed.scores||{},aiScores:parsed.scores||{},
          autofails:parsed.autofails||[],autofail:hasAF,
          comments:parsed.comments||"",
          totalPoints:sc?sc.pts:0,maxPoints:sc?sc.max:0,
          finalScore:sc?sc.pct:0,aiScore:sc?sc.pct:0,
          passed:!hasAF&&(sc?sc.pct:0)>=85,
          hasDisputes:false,disputes:{},
          justifications:parsed.justifications||{},
          customerEmail:ticket.customerEmail,
          savedAt:new Date().toISOString(),
          transcript:ticket.transcript||"",
        };
        // Save to Notion immediately
        setBatchStatus("Saving #"+ticket.ticketId+" to Notion...");
        try {
          await saveTicketToNotion(TICKETS_DB_ID, newResult);
          setTickets(function(prev){return prev.concat([newResult]);});
        } catch(saveErr) {
          console.error("Save failed for",ticket.ticketId,saveErr);
          newResult._saveError=saveErr.message;
        }
        results=[...results,newResult];
      } catch(err){
        results=[...results,{ticketId:ticket.ticketId,agentName:ticket.agentName,error:err.message,finalScore:0,passed:false,autofail:false,week}];
      }
      setBatchResults([...results]);
      // Paid tier: short delay between tickets to avoid bursts
      if(i < batchTickets.length-1 && !batchStopRef.current) {
        setBatchStatus("Processing next ticket...");
        await new Promise(function(r){setTimeout(r,2000);});
      }
    }
    setBatchRunning(false);
    if(!batchStopRef.current){
      var evalCount=results.filter(function(r){return !r.error&&!r._saveError;}).length;
      var saveErrors=results.filter(function(r){return r._saveError;}).length;
      var msg="Done! "+evalCount+" tickets evaluated and saved"+(skipped>0?" · "+skipped+" skipped":"")+(saveErrors>0?" · "+saveErrors+" save errors":"");
      setBatchStatus(msg);
      addToast(evalCount+" tickets saved to Notion"+(saveErrors>0?" ("+saveErrors+" save errors)":""));
      setTimeout(function(){
        setBatchTickets([]);setBatchResults([]);setBatchStatus("");
        setView("dashboard");
      },2000);
    }
  }

  async function saveBatchToDatabase() {
    var valid=batchResults.filter(function(r){return !r.error;});
    if(!valid.length){addToast("No valid results to save","error");return;}
    addToast("Saving "+valid.length+" tickets to Notion...");
    var saved=0, failed=0, firstError="";
    for(var i=0;i<valid.length;i++){
      try {
        var result = await saveTicketToNotion(TICKETS_DB_ID, valid[i]);
        if(!result || !result.id) throw new Error("No page ID returned");
        saved++;
        setBatchStatus("Saved "+(i+1)+" of "+valid.length+"...");
      } catch(e) {
        console.error("Save failed for ticket", valid[i].ticketId, e);
        if(!firstError) firstError = e.message;
        failed++;
      }

    var updated=tickets.concat(valid);
    setTickets(updated);
    setBatchStatus("");
    if(failed>0){
      addToast(saved+" saved, "+failed+" failed: "+firstError.slice(0,80),"error");
    } else {
      addToast(saved+" tickets saved to Notion");
      setBatchTickets([]);setBatchResults([]);setBatchStatus("");
      setView("dashboard");
    }
  }

  async function buildAgentReportHTML(agentName, fromVal, toVal, onStatus) {
    var agentTickets = tickets.filter(function(t) {
      if(t.agentName !== agentName) return false;
      // Use createdDate if available, fall back to savedAt (many migrated tickets have blank createdDate)
      var created = ((t.createdDate||"").slice(0,10)) || ((t.savedAt||"").slice(0,10));
      if(fromVal && toVal) {
        if(!created) return false; // skip tickets with no date when filtering by range
        if(created < fromVal) return false;
        if(created > toVal) return false;
      }
      return true;
    });
    if(!agentTickets.length) return null;

    var avg = Math.round(agentTickets.reduce(function(s,t){return s+t.finalScore;},0)/agentTickets.length);
    var highest = Math.max.apply(null, agentTickets.map(function(t){return t.finalScore;}));
    var lowest = Math.min.apply(null, agentTickets.map(function(t){return t.finalScore;}));
    var passed = agentTickets.filter(function(t){return t.passed;}).length;

  function chunkReportContent(html) {
    // Split HTML into chunks of 1990 chars max, up to 20 chunks = 39800 chars total
    var chunks = [];
    for(var i=0;i<20;i++) chunks.push("");
    var remaining = html;
    for(var i=0;i<20;i++){
      if(!remaining) break;
      chunks[i] = remaining.slice(0,1990);
      remaining = remaining.slice(1990);
    }
    return chunks;
  }

  async function saveReportToNotion(agentEmail, agentName, week, html) {
    if(!REPORTS_DB_ID||!html) return;
    var chunks = chunkReportContent(html);
    var now = new Date().toISOString();
    // Check if a report for this agent+week already exists
    try {
      var existing = await notionAPI("/v1/databases/"+REPORTS_DB_ID+"/query","POST",{});
      var pages = (existing.results||[]).filter(function(p){
        var emailProp = p.properties["Agent Email"];
        var weekProp = p.properties["Week"];
        var storedEmail = (emailProp&&emailProp.title&&emailProp.title[0]&&emailProp.title[0].plain_text)||"";
        var storedWeek = (weekProp&&weekProp.rich_text&&weekProp.rich_text[0]&&weekProp.rich_text[0].plain_text)||"";
        return storedEmail.toLowerCase()===agentEmail.toLowerCase() && storedWeek===(week||"");
      });
      if(pages.length>0){
        // Update existing
        var patch = {"Generated At":{rich_text:[{text:{content:now}}]},"Generated By":{rich_text:[{text:{content:currentUser.name}}]}};
        for(var ci=0;ci<20;ci++) patch["Report Content "+(ci+1)]={rich_text:[{text:{content:chunks[ci]||""}}]};
        await notionAPI("/v1/pages/"+pages[0].id,"PATCH",{properties:patch});
      } else {
        // Create new
        var newProps = {
          "Agent Email":{title:[{text:{content:agentEmail}}]},
          "Agent Name": {rich_text:[{text:{content:agentName}}]},
          "Week":       {rich_text:[{text:{content:week||""}}]},
          "Generated At":{rich_text:[{text:{content:now}}]},
          "Generated By":{rich_text:[{text:{content:currentUser.name}}]},
        };
        for(var ci2=0;ci2<20;ci2++) newProps["Report Content "+(ci2+1)]={rich_text:[{text:{content:chunks[ci2]||""}}]};
        await notionAPI("/v1/pages","POST",{parent:{database_id:REPORTS_DB_ID},properties:newProps});
      }
    } catch(e){ console.error("Failed to save report to Notion:",agentName, e.message, e); addToast("Report save failed for "+agentName+": "+e.message.slice(0,60),"error"); }
  }

  async function generateAIInsights(fromVal, toVal) {
    var filtered=tickets.filter(function(t){
      var created=(t.createdDate||"").slice(0,10);
      if(fromVal&&created&&created<fromVal)return false;
      if(toVal&&created&&created>toVal)return false;
      return true;
    });
    if(!filtered.length){addToast("No tickets in date range","error");return;}
    setAiInsightsLoading(true);setAiInsights(null);setAiInsightsError("");

    // Build compact data summary for Claude
    var allAgents=[...new Set(filtered.map(function(t){return t.agentName;}).filter(Boolean))].sort();
    var teamAvg=Math.round(filtered.reduce(function(s,t){return s+t.finalScore;},0)/filtered.length);
    var passRate=Math.round(filtered.filter(function(t){return t.passed;}).length/filtered.length*100);
    var autofails=filtered.filter(function(t){return t.autofail;}).length;
    var disputed=filtered.filter(function(t){return t.hasDisputes;}).length;

    function catLbl(val){if(!val||val==="NA")return null;var v=val.toUpperCase();if(v.startsWith("YES"))return "Pass";if(v.startsWith("PARTIAL"))return "Partial";if(v.startsWith("NO"))return "Miss";return null;}

    var catStats=matrix.map(function(c){
      var app=filtered.filter(function(t){var v=(t.scores&&t.scores[c.id])||"";return v&&v!=="NA";});
      if(!app.length)return null;
      var pass=app.filter(function(t){return catLbl((t.scores&&t.scores[c.id])||"")==="Pass";}).length;
      var partial=app.filter(function(t){return catLbl((t.scores&&t.scores[c.id])||"")==="Partial";}).length;
      var miss=app.filter(function(t){return catLbl((t.scores&&t.scores[c.id])||"")==="Miss";}).length;
      return c.label+": "+Math.round(pass/app.length*100)+"% pass ("+pass+"P·"+partial+"Pt·"+miss+"M of "+app.length+")";
    }).filter(Boolean).join("\n");

    var agentStats=allAgents.map(function(a){
      var ats=filtered.filter(function(t){return t.agentName===a;});
      var avg=Math.round(ats.reduce(function(s,t){return s+t.finalScore;},0)/ats.length);
      var pr=Math.round(ats.filter(function(t){return t.passed;}).length/ats.length*100);
      var afs=ats.filter(function(t){return t.autofail;}).length;
      var disp=ats.filter(function(t){return t.hasDisputes;}).length;
      return a+": avg="+avg+"% pass="+pr+"% tickets="+ats.length+" autofails="+afs+" disputes="+disp;
    }).join("\n");

    // Contact reason breakdown
    var crMap={};
    filtered.forEach(function(t){
      var cr=(t.contactReason||"Unknown").split("::")[0].trim();
      if(!crMap[cr])crMap[cr]={total:0,pass:0};
      crMap[cr].total++;
      if(t.passed)crMap[cr].pass++;
    });
    var crStats=Object.entries(crMap).sort(function(a,b){return b[1].total-a[1].total;}).map(function(e){
      return e[0]+": "+e[1].total+"t, "+Math.round(e[1].pass/e[1].total*100)+"% pass";
    }).join("\n");

    var dateLabel=fromVal&&toVal?fromVal+" to "+toVal:fromVal?"from "+fromVal:toVal?"to "+toVal:"all time";

    // Build per-ticket detail for deeper analysis
    var ticketDetail=filtered.map(function(t){
      var catScores=matrix.map(function(c){
        var v=(t.scores&&t.scores[c.id])||"NA";
        return c.id+":"+v;
      }).join(",");
      return "["+t.ticketId+"] agent="+t.agentName+" score="+t.finalScore+"% passed="+t.passed+" autofail="+t.autofail+" disputed="+t.hasDisputes+" cr="+t.contactReason+" | "+catScores;
    }).join("\n");

    var rubricSummary=matrix.map(function(c){return c.id+" ("+c.label+", max "+c.max+"pt)";}).join(", ");

    var prompt=`You are a senior QA analyst for Freedom Grooming, a subscription grooming brand. You are preparing a leadership briefing from QA ticket data. Your analysis must be specific, honest, and directly actionable — no generic advice. IMPORTANT: Respond in English only. Do not use any other language or characters under any circumstances.

PERIOD: ${dateLabel}
TEAM SUMMARY: ${filtered.length} tickets | ${allAgents.length} agents | avg ${teamAvg}% | ${passRate}% pass rate | ${autofails} autofails | ${disputed} disputed

CATEGORY PERFORMANCE (Pass% | Pass·Partial·Miss counts):
${catStats}

AGENT PERFORMANCE (avg% | pass% | tickets | autofails | disputes):
${agentStats}

CONTACT REASON PERFORMANCE:
${crStats}

INDIVIDUAL TICKET DATA:
${ticketDetail}

Analyze this data deeply. Look for patterns across agents and contact reasons. Identify the single biggest lever for improvement. Call out specific agents by name. Connect category scores to business outcomes (CSAT, revenue, churn).

Return ONLY valid JSON with this exact structure (no markdown, no extra text):
{

  function exportAllCSV() {
    var rows=[["Week","Agent","Reviewer","Ticket ID","Contact Reason",
      "AI Score","AI Pass/Fail","Disputed Score","Disputed Pass/Fail",
      "Has Disputes","Autofail","Comments"]
      .concat(matrix.map(function(c){return c.label+" (AI)";}))
      .concat(matrix.map(function(c){return c.label+" (Final)";}))
    ];
    tickets.forEach(function(t){
      var dispSc=calcDisputedScore(t,matrix);
      var dispPassed=dispSc?(!t.autofail&&dispSc.pct>=85):false;
      var finalScores=matrix.map(function(c){
        var d=t.disputes&&t.disputes[c.id];
        return (d&&d.status==="approved")?d.finalScore:((t.aiScores&&t.aiScores[c.id])||"");
      });
      rows.push([t.week,t.agentName,t.reviewer,t.ticketId,t.contactReason,
        (t.aiScore||t.finalScore)+"%",t.passed?"PASS":"FAIL",
        dispSc?dispSc.pct+"%":"N/A",dispPassed?"PASS":"FAIL",
        t.hasDisputes?"YES":"NO",t.autofail?"YES":"NO",
        '"'+(t.comments||"").replace(/"/g,'""')+'"']
        .concat(matrix.map(function(c){return(t.aiScores&&t.aiScores[c.id])||"";}))
        .concat(finalScores)
      );
    });
    downloadBlob(rows.map(function(r){return r.join(",");}).join("\n"),"qa_export_"+Date.now()+".csv","text/csv;charset=utf-8;");
  }

  // ── RECALCULATE FINAL PASSED ────────────────────────────────────────────────
  async function recalcFinalPassed() {
    var toFix = tickets.filter(function(t){
      var effective = t.autofail ? false
        : (t.disputedPassed!==undefined) ? t.disputedPassed
        : t.finalScore >= 85;
      return effective !== !!(t.finalPassed||t.passed) && t.notionPageId;
    });
    if(!toFix.length){ addToast("All Final Passed flags are correct — nothing to fix"); return; }
    addToast("Fixing "+toFix.length+" tickets...");
    var fixed=0;
    for(var i=0;i<toFix.length;i++){
      var t=toFix[i];
      var correct = t.autofail ? false : (t.disputedPassed!==undefined) ? t.disputedPassed : t.finalScore>=85;
      try {
        await notionAPI("/v1/pages/"+t.notionPageId,"PATCH",{properties:{
          "Final Passed":{checkbox:correct}
        }});
        fixed++;
        setSyncStatus("Fixed "+(i+1)+" of "+toFix.length+"...");
      } catch(e){ console.error("Fix failed for",t.ticketId,e.message); }
    }
    // Update local state
    setTickets(function(ts){return ts.map(function(t){
      var correct = t.autofail?false:(t.disputedPassed!==undefined)?t.disputedPassed:t.finalScore>=85;
      return Object.assign({},t,{finalPassed:correct,passed:correct});
    });});
    addToast("Fixed "+fixed+" tickets");
    setSyncStatus("");
  }

  async function loadUsersFromNotion() {
    var dbId = window.__ENV__&&window.__ENV__.QA_USERS_DB_ID;
    if(!dbId) { setUserList(hardcodedUsersArray()); return hardcodedUsersArray(); }
    try {
      var users = [];
      var cursor = undefined, hasMore = true;
      while(hasMore) {
        var body = { page_size: 100 };
        if(cursor) body.start_cursor = cursor;
        var data = await notionAPI("/v1/databases/"+dbId+"/query","POST",body);
        (data.results||[]).forEach(function(page){
          var props = page.properties||{};
          // Email is the Title field
          var emailArr = (props.Email||{}).title||[];
          var email = emailArr[0]&&emailArr[0].text&&emailArr[0].text.content ? emailArr[0].text.content.toLowerCase().trim() : "";
          var nameArr  = (props.Name||{}).rich_text||[];
          var name     = nameArr[0]&&nameArr[0].text ? nameArr[0].text.content.trim() : "";
          // Role — support both select and rich_text
          var roleProp = props.Role||{};
          var role;
          if(roleProp.select&&roleProp.select.name) {
            role = roleProp.select.name.toLowerCase().trim();
          } else {
            var roleArr = roleProp.rich_text||[];
            role = roleArr[0]&&roleArr[0].text ? roleArr[0].text.content.toLowerCase().trim() : "view";
          }
          var activeVal = (props.Active||{}).checkbox;
          var active = activeVal !== false; // default true if not set
          var notesArr = (props.Notes||{}).rich_text||[];
          var notes = notesArr[0]&&notesArr[0].text ? notesArr[0].text.content.trim() : "";
          if(email) users.push({
            notionPageId: page.id,
            email, name: name||email.split("@")[0], role, active, notes,
            agentName: name // display_name = Gorgias agent name by convention
          });
        });
        hasMore = data.has_more||false;
        cursor  = data.next_cursor;
      }
      console.log("[QA] Loaded", users.length, "users from QA Users DB");
      setUserList(users);
      return users;
    } catch(e) {
      console.error("[QA] loadUsers:", e);
      var fallback = hardcodedUsersArray();
      setUserList(fallback);
      return fallback;
    }
  }

  // ── GORGIAS FETCH ────────────────────────────────────────────────────────────
  async function gorgiasAPI(endpoint, params, method) {
    var resp = await fetch(window.location.origin+"/gorgias", {
      method: "POST",
      headers: {"Content-Type":"application/json","X-Session-Token":sessionStorage.getItem("qa_session")||""},
      body: JSON.stringify({endpoint: endpoint, params: params||{}, method: method||"GET"})
    });
    if(resp.status === 429) return {_status: 429};
    if(!resp.ok) throw new Error("Gorgias API error: "+resp.status);
    return resp.json();
  }

  function stripHTML(html) {
    if(!html) return "";
    html = html.replace(/<blockquote[^>]*>[\s\S]*?<\/blockquote>/gi,"");
    html = html.replace(/<br\s*\/?>/gi,"\n");
    html = html.replace(/<\/?(p|div|li|tr|h[1-6])[^>]*>/gi,"\n");
    html = html.replace(/<[^>]+>/g,"");
    html = html.replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">")
               .replace(/&nbsp;/g," ").replace(/&#39;/g,"'").replace(/&quot;/g,'"');
    html = html.replace(/On\s+(Mon|Tue|Wed|Thu|Fri|Sat|Sun)[^\n]*\d{4}[^\n]*:/gi,"");
    html = html.replace(/^>+\s?/gm,"");
    return html.replace(/\s+/g," ").trim().slice(0,2000);
  }

  function buildTranscript(messages) {
    var sorted = messages.slice().sort(function(a,b){return (a.created_datetime||"").localeCompare(b.created_datetime||"");});
    var lines = [];
    sorted.forEach(function(m){
      var isAgent = m.from_agent || ((m.sender||{}).meta||{}).is_staff;
      var role = isAgent ? "Agent" : "Customer";
      var sender = (m.sender||{}).name || role;
      var bodyText = (m.body_text||"").trim();
      var bodyHtml = m.body_html || m.body || "";
      var body = (bodyText && !/<[a-zA-Z]/.test(bodyText)) ? bodyText : stripHTML(bodyHtml);
      body = body.split("\n").join(" ").split("\r").join(" ").split("\t").join(" ").replace(/  +/g," ").trim();
      var junkWords = ["billing address","shipping address","items ordered","subtotal:","all rights reserved","unsubscribe"];
      var isJunk = junkWords.filter(function(j){return body.toLowerCase().includes(j);}).length >= 2;
      if(isJunk) return;
      var time = (m.created_datetime||"").slice(0,16).replace("T"," ");
      lines.push("["+role+" - "+sender+" @ "+time+"]: "+body);
    });
    return lines.join(" | ");
  }

  function parseTicketField(ticket, fieldId) {
    var cf = ticket.custom_fields || {};
    var val = cf[String(fieldId)];
    if(!val) return ["",""];
    if(typeof val === "object") val = val.value || val.text || "";
    val = String(val).trim();
    if(!val) return ["",""];
    if(val.includes("::")) { var p=val.split("::",2); return [p[0].trim(), p[1].trim()]; }
    return [val, "N/A"];
  }

  async function fetchGorgiasTickets() {
    setFetchLoading(true); setFetchError(""); setFetchedTickets([]); setFetchSummary(null);
    fetchCancelRef.current = false;
    var f = fetchForm;
    try {
      // Build date params
      var since = null, until = null;
      if(f.dateMode==="range" && f.fromDate) {
        since = f.fromDate+"T00:00:00";
        until = f.toDate ? f.toDate+"T23:59:59" : null;
        console.log("[QA][filter] Date range:", since, "→", until||"no end");
      } else {
        var d = new Date(); d.setDate(d.getDate() - parseInt(f.lastDays||7));
        since = d.toISOString().slice(0,10)+"T00:00:00";
        console.log("[QA][filter] Last N days:", f.lastDays||7, "→ since", since);
      }

      // Active status filters
      var activeStatuses = Object.entries(f.status||{}).filter(function(e){return e[1];}).map(function(e){return e[0];});
      var filterByStatus = activeStatuses.length > 0 && activeStatuses.length < 3;
      console.log("[QA][filter] Status filter:", filterByStatus ? activeStatuses.join(", ") : "all statuses");

      var cursor = null;
      var maxTickets = parseInt(f.maxTickets||500) || 500;
      var skipHrs = parseInt(f.skipHours||"0") || 0;
      var cutoffSkip = skipHrs > 0 ? new Date(Date.now() - skipHrs*60*60*1000).toISOString().slice(0,19) : null;
      if(cutoffSkip) console.log("[QA][fetch] Skipping tickets closed within last "+skipHrs+"h, cutoff:", cutoffSkip);
      var reachedCutoff = false;

      var fc = {
        scanned:0, raw:0, skippedStatus:0, skippedRecentlyClosed:0,
        skippedChannel:0, skippedAgentFilter:0,
        skippedCR:0, skippedRes:0, skippedMsgCount:0, skippedKeyword:0,
        skippedAgentCap:0, skippedDeleted:0, result:0
      };

      var channels = Object.entries(f.channels).filter(function(e){return e[1];}).map(function(e){return e[0];});
      var selectedAgentNames = Object.entries(f.selectedAgents||{}).filter(function(e){return e[1];}).map(function(e){return e[0].toLowerCase();});
      var FIELD_CR=9969, FIELD_PROD=5807, FIELD_RES=11375, FIELD_ADDRES=11421;

      console.log("[QA][fetch] Date filter (client-side) \u2014 start:", since, "end:", until||"none");
      console.log("[QA][filter] Status:", filterByStatus ? activeStatuses.join(", ") : "all");

      var results = [];
      var perAgent = parseInt(f.ticketsPerAgent||"") || null;
      var agentCounts = {};
      if(perAgent) console.log("[QA][filter] Tickets per agent cap:", perAgent);

      setFetchStatus("Scanning for tickets in your date range...");

      while(!reachedCutoff) {
        if(fetchCancelRef.current) { setFetchStatus("Cancelled \u2014 "+results.length+" matched."); break; }
        var params = { limit: 30 };
        if(cursor) params.cursor = cursor;
        var page = await gorgiasAPI("/tickets", params);
        var data = page.data || [];
        if(!data.length) break;

        // Skip-fast: if all tickets on this page are newer than our window, no delay needed
        if(until) {
          var allTooNew = data.every(function(t){
            return (t.created_datetime||"").slice(0,19) > until;
          });
          if(allTooNew) {
            fc.scanned += data.length;
            setFetchStatus("Scanning — skipped "+fc.scanned+" recent tickets, reaching your date range...");
            var nc = (page.meta||{}).next_cursor||page.next_cursor;
            if(!nc) break;
            cursor = nc;
            continue; // no delay
          }
        }

        for(var ti=0; ti<data.length; ti++) {
          if(fetchCancelRef.current) break;
          var t = data[ti];
          var tid = t.id;
          var created = (t.created_datetime||"").slice(0,19);

          fc.scanned++;
          if(until && created && created > until) {
            setFetchStatus("Scanning \u2014 skipping "+fc.scanned+" recent tickets to reach your date range...");
            continue;
          }
          if(since && created && created < since) { reachedCutoff = true; break; }
          fc.raw++;

          if(filterByStatus) {
            var tStatus = (t.status||"").toLowerCase();
            if(!activeStatuses.includes(tStatus)) { fc.skippedStatus++; continue; }
          }

          if(cutoffSkip && t.closed_datetime) {
            var closedAt = (t.closed_datetime||"").slice(0,19);
            if(closedAt && closedAt > cutoffSkip) { fc.skippedRecentlyClosed++; continue; }
          }

          if(channels.length) {
            if(!channels.includes((t.channel||t.via||"").toLowerCase())) { fc.skippedChannel++; continue; }
          }

          if(f.agentFilter==="Has agent assigned" && !t.assignee_user) { fc.skippedAgentFilter++; continue; }
          if(f.agentFilter==="No agent assigned" && t.assignee_user)   { fc.skippedAgentFilter++; continue; }

          var agentName = "";
          if(t.assignee_user) {
            var au = t.assignee_user;
            agentName = au.name || ((au.firstname||"")+" "+(au.lastname||"")).trim();
          }

          if(selectedAgentNames.length && agentName && !selectedAgentNames.includes(agentName.toLowerCase())) {
            fc.skippedAgentFilter++; continue;
          }

          var crParts     = parseTicketField(t, FIELD_CR);
          var prodParts   = parseTicketField(t, FIELD_PROD);
          var resParts    = parseTicketField(t, FIELD_RES);
          var addResParts = parseTicketField(t, FIELD_ADDRES);

          if(f.crL1 && crParts[0].toLowerCase() !== f.crL1.toLowerCase()) { fc.skippedCR++; continue; }
          if(f.crL2 && f.crL2.trim() && crParts[1].toLowerCase() !== f.crL2.trim().toLowerCase()) { fc.skippedCR++; continue; }
          if(f.prodL1 && prodParts[0].toLowerCase() !== f.prodL1.toLowerCase()) { fc.skippedCR++; continue; }
          if(f.resL1 && resParts[0].toLowerCase() !== f.resL1.toLowerCase()) { fc.skippedRes++; continue; }
          if(f.resL2 && f.resL2.trim() && resParts[1].toLowerCase() !== f.resL2.trim().toLowerCase()) { fc.skippedRes++; continue; }
          if(f.addResL1 && addResParts[0].toLowerCase() !== f.addResL1.toLowerCase()) { fc.skippedRes++; continue; }
          if(f.addResL2 && f.addResL2.trim() && addResParts[1].toLowerCase() !== f.addResL2.trim().toLowerCase()) { fc.skippedRes++; continue; }

          if(deletedTicketIds.has(String(tid))) { fc.skippedDeleted++; continue; }

          if(perAgent && agentName && (agentCounts[agentName]||0) >= perAgent) { fc.skippedAgentCap++; continue; }

          // All cheap filters passed — update live counter before expensive message fetch
          setFetchStatus("Searched "+fc.raw+" \u00b7 Matched "+results.length+(maxTickets?" / "+maxTickets:""));

          // Fetch messages
          var transcript = "";
          var msgCount = 0;
          for(var attempt=0; attempt<5; attempt++) {
            try {
              var msgResp = await gorgiasAPI("/tickets/"+tid+"/messages", {limit:100});
              if(msgResp._status === 429) {
                var wait = [10000,20000,40000,60000,120000][attempt];
                setFetchStatus("Rate limited \u2014 pausing "+(wait/1000)+"s... (searched "+fc.raw+" \u00b7 matched "+results.length+")");
                await new Promise(function(r){setTimeout(r,wait);});
                continue;
              }
              var messages = msgResp.data || [];
              msgCount = messages.length;
              transcript = buildTranscript(messages);
              break;
            } catch(e) {
              if(attempt===4) transcript = "Error: "+e.message;
              else { await new Promise(function(r){setTimeout(r,5000*(attempt+1));}); }
            }
          }

          var minMsg2 = parseInt(f.msgMin||"")||null;
          var maxMsg2 = parseInt(f.msgMax||"")||null;
          if(minMsg2 && msgCount < minMsg2) { fc.skippedMsgCount++; await new Promise(function(r){setTimeout(r,500);}); continue; }
          if(maxMsg2 && msgCount > maxMsg2) { fc.skippedMsgCount++; await new Promise(function(r){setTimeout(r,500);}); continue; }

          if(f.keyword && f.keyword.trim()) {
            var haystack = (transcript + " " + (t.subject||"")).toLowerCase();
            var kwWords = f.keyword.trim().toLowerCase().split(/[\s,]+/).filter(function(w){return w.length>0;});
            var allMatch = kwWords.every(function(w){return haystack.includes(w);});
            if(!allMatch) { fc.skippedKeyword++; await new Promise(function(r){setTimeout(r,500);}); continue; }
          }

          var customerEmail = (t.customer||{}).email || "";
          var createdFmt = (t.created_datetime||"").slice(0,16).replace("T"," ");

          results.push({
            ticket_id:                String(tid),
            ticket_url:               "https://"+((window.__ENV__&&window.__ENV__.GORGIAS_DOMAIN)||"freedomgrooming.gorgias.com")+"/app/ticket/"+tid,
            subject:                  t.subject || "(no subject)",
            status:                   t.status || "",
            initial_channel:          t.channel || t.via || "",
            created_date:             createdFmt,
            agent:                    agentName,
            customer_email:           customerEmail,
            contact_reason_l1:        crParts[0],
            contact_reason_l2:        crParts[1],
            product_l1:               prodParts[0],
            ticket_resolution_l1:     resParts[0],
            ticket_resolution_l2:     resParts[1],
            additional_resolution_l1: addResParts[0],
            additional_resolution_l2: addResParts[1],
            message_count:            msgCount,
            transcript:               transcript,
          });
          fc.result++;

          if(perAgent && agentName) {
            agentCounts[agentName] = (agentCounts[agentName]||0) + 1;
          }

          setFetchStatus("Searched "+fc.raw+" \u00b7 Matched "+results.length+(maxTickets?" / "+maxTickets:""));
          await new Promise(function(r){setTimeout(r,500);});

          if(maxTickets && results.length >= maxTickets) {
            console.log("[QA][fetch] Max results reached ("+maxTickets+") \u2014 stopping");
            reachedCutoff = true; break;
          }
        }

        var nextCursor = (page.meta||{}).next_cursor || page.next_cursor;
        if(!nextCursor || reachedCutoff) break;
        cursor = nextCursor;
        await new Promise(function(r){setTimeout(r,100);});
      }

      fc.result = results.length;
      setFetchSummary(Object.assign({},fc));
      console.log("[QA][summary]", fc);
      setFetchedTickets(results);
      setFetchStatus("Done — "+results.length+" ticket"+(results.length!==1?"s":"")+" fetched.");
    } catch(e) {
      setFetchError("Error: "+e.message);
      setFetchStatus("");
    }
    setFetchLoading(false);
  }

  function downloadFetchedCSV() {

    var rows = [keys.join(",")].concat(fetchedTickets.map(function(r){
      return keys.map(function(k){
        var v = String(r[k]||"").replace(/"/g,'""');
        return '"'+v+'"';
      }).join(",");
    }));
    var blob = new Blob([rows.join("\n")], {type:"text/csv;charset=utf-8;"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href=url; a.download="gorgias_export_"+new Date().toISOString().slice(0,10)+".csv";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},1000);
    addToast("CSV downloaded");
  }

  // ── MANUAL AUDIT ─────────────────────────────────────────────────────────────
  async function runManualAudit() {
    if(!manualForm.ticketId.trim()||!manualForm.agentName||!manualForm.transcript.trim()) {
      addToast("Ticket ID, Agent and Transcript are required","error"); return;
    }
    setManualRunning(true); setManualResult(null); setManualStatus("Scoring ticket with AI...");
    try {
      // Build prompt identical to batch QA
      var justSchema=matrix.map(function(c){return '"'+c.id+'":{reason:"",improve:""}';}).join(",");
      var scoreOptions=matrix.map(function(c){return c.id+": "+c.levels.map(function(l){return l.level+(l.points!==null?" ("+l.points+")":"");}).join("/");}).join("; ");
      var prompt = "You are a QA analyst for Freedom Grooming customer support. Score this ticket against the rubric. Respond in English only.\n\nSCORING: "+scoreOptions+".\nUse NA if category doesn't apply.\n\n"
        +"AUTOFAIL CONDITIONS:\n1. Failing to complete promised resolution\n2. Wrong account-level action\n3. Financial/operational risk through incorrect workflow\n4. Materially inaccurate policy info\n5. Tone that materially worsens risk\n\n"
        +"TICKET INFO:\nAgent: "+manualForm.agentName+"\nContact Reason: "+(manualForm.contactReason||"Unknown")+"\n\n"
        +"TRANSCRIPT:\\n"+manualForm.transcript+"\\n\\n"
        +"Respond ONLY with valid JSON matching exactly:\n{"
        +'"scores":{'+matrix.map(function(c){return '"'+c.id+'":"YES/PARTIAL/NO/NA (points)"';}).join(",")+'},'
        +'"justifications":{'+justSchema+'},'
        +'"autofails":[],'
        +'"comments":"+ [key strength observation]\n- [key improvement observation]"}';

      var result = await callClaudeWithRetry(prompt);
      var parsed = tryParseJSON(result);
      if(!parsed||!parsed.scores){addToast("AI scoring failed — invalid response","error");setManualRunning(false);setManualStatus("");return;}

      var aiScores=parsed.scores||{};
      var justifications=parsed.justifications||{};
      var autofailsList=parsed.autofails||[];
      var comments=parsed.comments||"";

      // Calculate score
      var pts=0,mx=0;
      matrix.forEach(function(c){var v=aiScores[c.id]||"";if(!v||v.toUpperCase()==="NA")return;var m=String(v).match(/\(([\d.]+)\)/);if(m){pts+=parseFloat(m[1]);mx+=c['max'];}});
      var aiScore=mx>0?Math.round(pts/mx*100):0;
      var passed=aiScore>=PASS_THRESHOLD;
      var autofail=autofailsList.length>0;
      var now=new Date().toISOString();
      var week=manualForm.week||"Manual - "+now.slice(0,10);

  // ── CALIBRATION ───────────────────────────────────────────────────────────────
  async function runCalibration() {
    var disputed=tickets.filter(function(t){return t.hasDisputes||(t.disputes&&Object.keys(t.disputes).length>0);});
    if(disputed.length<10){addToast("Need at least 10 disputed tickets for calibration (currently "+disputed.length+")","error");return;}
    setCalibrationRunning(true); setCalibrationResult(null);
    try {
      var disputeData=disputed.map(function(t){
        var cats=Object.entries(t.disputes||{}).map(function(e){
          var catId=e[0],d=e[1];
          var c=matrix.find(function(m){return m.id===catId;})||{label:catId};
          return {category:c.label,aiScore:t.aiScores&&t.aiScores[catId],finalScore:d.finalScore,justification:d.justification};
        });
        return {ticketId:t.ticketId,agent:t.agentName,contactReason:t.contactReason,disputes:cats};
      });

      // Category dispute counts for context
      var catCounts={};
      disputeData.forEach(function(t){t.disputes.forEach(function(d){catCounts[d.category]=(catCounts[d.category]||0)+1;});});

      var prompt="You are a QA calibration analyst for Freedom Grooming customer support. Analyze these disputed tickets and return a structured JSON calibration report.\n\n"
        +"RUBRIC:\n"+matrix.map(function(c){return c.label+": "+c.levels.map(function(l){return l.level+(l.points!==null?" ("+l.points+")":"");}).join("/");}).join("\n")+"\n\n"
        +"DISPUTED TICKETS ("+disputed.length+" total):\n"+JSON.stringify(disputeData,null,2).slice(0,7000)+"\n\n"
        +"CATEGORY DISPUTE COUNTS: "+JSON.stringify(catCounts)+"\n\n"
        +"Return ONLY valid JSON (no markdown, no preamble) matching this exact structure:\n"
        +'{"summary":{"totalDisputed":0,"alignmentRating":"Good/Fair/Poor","overallAssessment":"2-3 sentence overview"},'
        +'"categoryAnalysis":[{"category":"","disputeCount":0,"pattern":"over-scoring/under-scoring/inconsistent","finding":"specific observation","recommendation":"specific fix"}],'
        +'"rubricGaps":[{"category":"","gap":"what is unclear","suggestedCriteria":"improved wording"}],'
        +'"promptImprovements":[{"category":"","current":"current prompt behavior","suggested":"specific improved instruction"}],'
        +'"quickWins":[{"title":"","impact":"High/Medium","action":"specific immediate change"}],'
        +'"agentPatterns":[{"finding":"observation about specific agents or contact reasons","implication":"what it means for QA"}]}';

      var result=await callClaudeWithRetry(prompt);
      var clean=result.replace(/```json|```/g,"").trim();
      var parsed=null;
      try { parsed=JSON.parse(clean); } catch(e){
        // fallback: try to extract JSON
        var m=clean.match(/\{[\s\S]*\}/);
        if(m) try { parsed=JSON.parse(m[0]); } catch(e2){}
      }
      if(!parsed){addToast("Could not parse calibration response — try again","error");setCalibrationRunning(false);return;}
      parsed._disputedCount = disputed.length;
      setCalibrationResult(parsed);
      addToast("Calibration analysis complete");
    } catch(e){addToast("Calibration failed: "+e.message,"error");}
    setCalibrationRunning(false);
  }

  function buildCalibrationDocHTML(data) {

  async function loadAllData(setup) {
    setLoading(true);
    setSyncStatus("Loading tickets from Notion...");
    try {
      const t = await loadTicketsFromNotion(setup.ticketsDbId, setSyncStatus);
      // Filter out soft-deleted tickets from all views
      var activeTickets = Array.isArray(t) ? t.filter(function(tk){return !tk.deleted;}) : [];
      // For View users with an agent name — filter to their own tickets only
      var agentFilter = setup._agentFilter||"";
      if(agentFilter){
        activeTickets = activeTickets.filter(function(tk){return tk.agentName===agentFilter;});
      }
      setTickets(activeTickets);

      // Load deleted ticket IDs — used to skip in fetcher + batch QA
      setSyncStatus("Loading deleted ticket IDs...");
      var deletedIds = new Set();
      var delCursor = undefined, delMore = true;
      while(delMore) {
        var delBody = {
          page_size: 100,
          filter: { property: "Deleted", checkbox: { equals: true } }
        };
        if(delCursor) delBody.start_cursor = delCursor;
        var delData = await notionAPI("/v1/databases/"+setup.ticketsDbId+"/query","POST",delBody);
        (delData.results||[]).forEach(function(p){
          var tid = getProp(p,"Ticket ID")||"";
          if(tid) deletedIds.add(String(tid));
        });
        delMore = delData.has_more||false;
        delCursor = delData.next_cursor;
      }
      setDeletedTicketIds(deletedIds);
      console.log("[QA] Loaded",deletedIds.size,"deleted ticket IDs");
      setSyncStatus("Loading users...");
      await loadUsersFromNotion();
      setSyncStatus("Loading matrix...");
      var savedMatrix = await loadConfigFromNotion(setup.configDbId, "matrix");
      if(savedMatrix && Array.isArray(savedMatrix)) setMatrix(savedMatrix);
      var savedAutofails = await loadConfigFromNotion(setup.configDbId, "autofails");
      if(savedAutofails && Array.isArray(savedAutofails)) setAutofailList(savedAutofails);
      var savedScoringContext = await loadConfigFromNotion(setup.configDbId, "scoringContext");
      if(savedScoringContext && typeof savedScoringContext === "string") setScoringContext(savedScoringContext);
      setSyncStatus("");
      if (Array.isArray(t) && t.length > 0) {
        addToast("Loaded " + t.length + " tickets");
      } else {
        addToast("No tickets found in Notion", "warning");
      }
    } catch(e) {
      console.error("[QA] load error:", e);
      addToast("Load error: " + e.message, "error");
      setSyncStatus("Error: " + e.message);
    } finally {
      setLoading(false);
    }
  }

  async function syncTickets() {
    if (!notionSetup) return;
    setSyncing(true);
    setSyncStatus("Syncing...");
    try {
      const t = await loadTicketsFromNotion(notionSetup.ticketsDbId, setSyncStatus);
      const safe = Array.isArray(t) ? t : [];
      setTickets(safe);
      setSyncStatus("");
      addToast("Synced " + safe.length + " tickets");
    } catch(e) {
      setSyncStatus("Sync failed: " + e.message);
      addToast("Sync error: " + e.message, "error");
    } finally {
      setSyncing(false);
    }
  }

  async function saveMatrix() {
    if (!notionSetup || !isEditor) { addToast("Editor access required", "error"); return; }
    try {
      await saveConfigToNotion(notionSetup.configDbId, "matrix", matrix);
      await saveConfigToNotion(notionSetup.configDbId, "autofails", autofailList);
      await saveConfigToNotion(notionSetup.configDbId, "scoringContext", scoringContext);
      setMatrixSaved(true); setTimeout(() => setMatrixSaved(false), 2000);

  function updateCatField(id,field,val){setMatrix(function(m){return m.map(function(c){return c.id===id?Object.assign({},c,{[field]:val}):c;});});}
  function updateLevelField(id,idx,field,val){setMatrix(function(m){return m.map(function(c){return c.id===id?Object.assign({},c,{levels:c.levels.map(function(l,i){return i===idx?Object.assign({},l,{[field]:val}):l;})}):c;});});}

  async function saveAgentDispute() {
    if(!reviewSelected||!currentUser){return;}
    var pending=Object.entries(disputeState).filter(function(e){
      var d=e[1];return d.newScore&&d.justification&&d.justification.trim();
    });
    if(!pending.length){addToast("No disputes to submit","error");return;}
    setSavingDispute(true);
    try {
      var updatedDisputes=Object.assign({},reviewSelected.disputes||{});
      pending.forEach(function(e){
        var catId=e[0],d=e[1];
        // Only allow one dispute per category — skip if already exists
        if(!updatedDisputes[catId]){
          updatedDisputes[catId]={
            finalScore:d.newScore,
            justification:d.justification.trim(),
            disputer:currentUser.name,
            disputedAt:new Date().toISOString(),
            status:"pending",  // pending | approved | rejected
            rejectedReason:"",
            decidedBy:"",
            decidedAt:"",
          };
        }
      });
      var hasDisputes=Object.keys(updatedDisputes).length>0;
      var disputesStr=JSON.stringify(updatedDisputes).slice(0,1990);
      if(reviewSelected.notionPageId){
        await notionAPI("/v1/pages/"+reviewSelected.notionPageId,"PATCH",{properties:{
          "Disputes JSON":{rich_text:[{text:{content:disputesStr}}]},
          "Has Disputes":  {checkbox:hasDisputes},
        }});
      }
      var updated=Object.assign({},reviewSelected,{disputes:updatedDisputes,hasDisputes});
      setTickets(function(ts){return ts.map(function(t){return t.id===updated.id?updated:t;});});
      setReviewSelected(updated);
      setDisputeState({});
      addToast("Dispute submitted — pending auditor review");
    } catch(e){addToast("Submit failed: "+e.message,"error");}
    setSavingDispute(false);
  }

  // ── DISPUTE APPROVAL (Edit+ users) ───────────────────────────────────────────
  async function saveDisputeApproval() {
    if(!reviewSelected||!isEditor)return;
    var decisions=Object.entries(approvalState).filter(function(e){return e[1].action;});
    if(!decisions.length){addToast("No decisions to save","error");return;}
    setSavingApproval(true);
    try {
      var updatedDisputes=Object.assign({},reviewSelected.disputes||{});
      var now=new Date().toISOString();
      decisions.forEach(function(e){
        var catId=e[0],dec=e[1];
        if(!updatedDisputes[catId])return;
        if(dec.action==="approve"){
          updatedDisputes[catId]=Object.assign({},updatedDisputes[catId],{
            status:"approved",decidedBy:currentUser.name,decidedAt:now,rejectedReason:""
          });
        } else {
          updatedDisputes[catId]=Object.assign({},updatedDisputes[catId],{
            status:"rejected",decidedBy:currentUser.name,decidedAt:now,
            rejectedReason:(dec.reason||"").trim(),
            // Revert score back to AI score on rejection
            finalScore:(reviewSelected.aiScores&&reviewSelected.aiScores[catId])||"",
          });
        }
      });
      // Recalculate final score using only approved disputes
      var merged={};
      matrix.forEach(function(c){
        var disp=updatedDisputes[c.id];
        var useDisp=disp&&disp.status==="approved";
        merged[c.id]=useDisp?disp.finalScore:((reviewSelected.aiScores&&reviewSelected.aiScores[c.id])||"");
      });
      var dispSc=calcScore(merged,matrix);
      var hasDisputes=Object.values(updatedDisputes).some(function(d){return d.status==="approved";});
      var disputesStr=JSON.stringify(updatedDisputes).slice(0,1990);
      var updated=Object.assign({},reviewSelected,{
        disputes:updatedDisputes,hasDisputes,
        finalScore:dispSc?dispSc.pct:reviewSelected.finalScore,
        reviewed:true,reviewedBy:currentUser.name,reviewedAt:now,
      });
      if(reviewSelected.notionPageId){
        await updateTicketInNotion(reviewSelected.notionPageId,updated);
        await notionAPI("/v1/pages/"+reviewSelected.notionPageId,"PATCH",{properties:{
          "Disputes JSON":{rich_text:[{text:{content:disputesStr}}]},
          "Has Disputes":  {checkbox:hasDisputes},
          "Reviewed":      {checkbox:true},
          "Reviewed By":   {rich_text:[{text:{content:currentUser.name}}]},
          "Reviewed At":   {rich_text:[{text:{content:now}}]},
        }});
      }
      setTickets(function(ts){return ts.map(function(t){return t.id===updated.id?updated:t;});});
      setReviewSelected(updated);
      setApprovalState({});
      addToast("Dispute decisions saved");
    } catch(e){addToast("Save failed: "+e.message,"error");}
    setSavingApproval(false);
  }

  async function saveDispute() {
    if(!reviewSelected||!disputerName.trim()){addToast("Select your name first","error");return;}
    var pending=Object.entries(disputeState).filter(function(e){
      var d=e[1];return (d.newScore&&d.justification&&d.justification.trim())||d.removed;
    });
    if(!pending.length){addToast("No changes to save","error");return;}
    setSavingDispute(true);
    try {
      var updatedDisputes=Object.assign({},reviewSelected.disputes||{});
      pending.forEach(function(e){
        var catId=e[0],d=e[1];
        if(d.removed){delete updatedDisputes[catId];}
        else{updatedDisputes[catId]={finalScore:d.newScore,justification:d.justification.trim(),disputer:disputerName,disputedAt:new Date().toISOString(),status:"approved",decidedBy:currentUser.name,decidedAt:new Date().toISOString()};}
      });
      var hasDisputes=Object.keys(updatedDisputes).length>0;
      var merged={};
      matrix.forEach(function(c){
        var disp=updatedDisputes[c.id];
        merged[c.id]=disp?disp.finalScore:((reviewSelected.aiScores&&reviewSelected.aiScores[c.id])||"");
      });
      var dispSc=calcScore(merged,matrix);
      var disputedPassed=dispSc?(!reviewSelected.autofail&&dispSc.pct>=85):reviewSelected.passed;
      var reviewerNotes=disputeState._reviewerNotes!==undefined?disputeState._reviewerNotes:(reviewSelected.reviewerNotes||"");
      var updated=Object.assign({},reviewSelected,{
        disputes:updatedDisputes,hasDisputes,
        finalScore:dispSc?dispSc.pct:reviewSelected.finalScore,
        disputedPassed,
        reviewed:true,
        reviewedBy:currentUser.name,
        reviewedAt:new Date().toISOString(),
        reviewerNotes:reviewerNotes,
      });
      if(updated.notionPageId){
        await updateTicketInNotion(updated.notionPageId,updated);
        // Also save reviewed status and reviewer notes
        await notionAPI("/v1/pages/"+updated.notionPageId,"PATCH",{properties:{
          "Reviewed":       {checkbox:true},
          "Reviewed By":    {rich_text:[{text:{content:currentUser.name}}]},
          "Reviewed At":    {rich_text:[{text:{content:updated.reviewedAt}}]},
          "Reviewer Notes": {rich_text:[{text:{content:reviewerNotes.slice(0,1990)}}]},
        }});
      }
      setTickets(function(ts){return ts.map(function(t){return t.id===updated.id?updated:t;});});
      setReviewSelected(updated);
      setDisputeState({});
      addToast(pending.length+" dispute"+(pending.length!==1?"s":"")+" saved");
    } catch(e){addToast("Save failed: "+e.message,"error");}
    setSavingDispute(false);
  }
